<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트레이딩 시그널/수익 공유 생성기</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e24;
            --section-bg: #25252e;
            --text-color: #e0e0e0;
            --accent-color: #00d26a;
            --danger-color: #f6465d;
            --border-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin: 0;
            color: #fff;
        }

        .section {
            background-color: var(--section-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: #1a1a20;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .output-box {
            background-color: #1a1a20;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: transparent;
            border: none;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            line-height: 1.5;
        }

        textarea:focus { outline: none; }

        .copy-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .copy-btn:hover { background-color: #00e075; }
        .copy-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="container">
    <h1>📝 트레이딩 시그널 생성기 (비중 ROE 적용)</h1>

    <!-- 기본 정보 -->
    <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="grid-3">
            <div>
                <label>코인/종목명</label>
                <input type="text" id="coin" value="BTC" placeholder="예: BTC">
            </div>
            <div>
                <label>포지션</label>
                <select id="pos">
                    <option value="long">Long (매수)</option>
                    <option value="short">Short (매도)</option>
                </select>
            </div>
            <div>
                <label>레버리지 (x)</label>
                <input type="number" id="lev" value="10" min="1">
            </div>
        </div>
    </div>

    <!-- 진입가 (EP) -->
    <div class="section">
        <div class="section-title">진입가 (EP) - 최대 3분할</div>
        <div class="grid-2">
            <div><label>진입가 1</label><input type="number" id="ep1Price" value="57800" step="0.01"></div>
            <div><label>투자금액 (USDT 등)</label><input type="number" id="ep1Usdt" value="25000"></div>
        </div>
        <div class="grid-2">
            <div><input type="number" id="ep2Price" value="56500" step="0.01" placeholder="진입가 2 (선택)"></div>
            <div><input type="number" id="ep2Usdt" value="25000" placeholder="투자금액 2 (선택)"></div>
        </div>
        <div class="grid-2">
            <div><input type="number" id="ep3Price" step="0.01" placeholder="진입가 3 (선택)"></div>
            <div><input type="number" id="ep3Usdt" placeholder="투자금액 3 (선택)"></div>
        </div>
    </div>

    <!-- 익절가 (TP) -->
    <div class="section">
        <div class="section-title">익절 타겟 (TP)</div>
        <div class="grid-2">
            <div><label>TP 1 가격</label><input type="number" id="tp1Price" value="60200" step="0.01"></div>
            <div><label>비중 (%)</label><input type="number" id="tp1Pct" value="25"></div>
        </div>
        <div class="grid-2">
            <div><input type="number" id="tp2Price" value="62200" step="0.01" placeholder="TP 2 가격"></div>
            <div><input type="number" id="tp2Pct" value="25" placeholder="비중 (%)"></div>
        </div>
        <div class="grid-2">
            <div><input type="number" id="tp3Price" value="65000" step="0.01" placeholder="TP 3 가격"></div>
            <div><input type="number" id="tp3Pct" value="25" placeholder="비중 (%)"></div>
        </div>
        <div class="grid-2">
            <div><input type="number" id="tp4Price" value="70000" step="0.01" placeholder="TP 4 가격"></div>
            <div><input type="number" id="tp4Pct" value="25" placeholder="비중 (%)"></div>
        </div>
    </div>

    <!-- 손절가 (SL) -->
    <div class="section">
        <div class="section-title">손절 (SL)</div>
        <div class="grid-2">
            <div><label>SL 가격</label><input type="number" id="slPrice" value="55700" step="0.01"></div>
            <div><label>비중 (%)</label><input type="number" id="slPct" value="100"></div>
        </div>
    </div>

    <!-- 결과 복사 영역 -->
    <div class="output-box">
        <textarea id="outputText" readonly></textarea>
        <button class="copy-btn" onclick="copyText()">📋 텍스트 복사하기</button>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(input => input.addEventListener('input', generateText));

    function formatNum(num) {
        return Number(num).toLocaleString('en-US', {maximumFractionDigits: 4});
    }

    function generateText() {
        const coin = (document.getElementById('coin').value || 'BTC').toUpperCase();
        const posValue = document.getElementById('pos').value;
        const posText = posValue === 'long' ? 'Long' : 'Short';
        const lev = parseFloat(document.getElementById('lev').value) || 1;

        let text = `${coin} ${posText} ${lev}x\n\n`;

        // 1. EP(진입가) 처리 및 평균 단가(Avg EP) 계산
        let epList = [];
        let totalUsdt = 0;
        let totalCoins = 0;

        for(let i=1; i<=3; i++) {
            const p = parseFloat(document.getElementById(`ep${i}Price`).value);
            const u = parseFloat(document.getElementById(`ep${i}Usdt`).value) || 0;
            if (p > 0) epList.push({price: p, usdt: u});
        }

        let avgEp = 0;
        let epString = '';

        if (epList.length > 0) {
            epString += `EP\n`;
            let allHaveUsdt = true;

            epList.forEach(ep => {
                epString += `${formatNum(ep.price)}`;
                if (ep.usdt > 0) {
                    epString += ` - ${formatNum(ep.usdt)} USDT\n`;
                    totalUsdt += ep.usdt;
                    totalCoins += (ep.usdt / ep.price);
                } else {
                    epString += '\n';
                    allHaveUsdt = false;
                }
            });

            // 평균 단가 계산 (물타기가 모두 체결되었다고 가정)
            if (allHaveUsdt && totalCoins > 0) {
                avgEp = totalUsdt / totalCoins; // 가중 평균
            } else {
                avgEp = epList.reduce((sum, ep) => sum + ep.price, 0) / epList.length; // 단순 평균
            }
            text += epString + '\n';
        }

        // 2. TP(익절) 처리 - 비중 적용된 ROE 출력
        let tpString = '';
        let hasTp = false;

        for(let i=1; i<=4; i++) {
            const p = parseFloat(document.getElementById(`tp${i}Price`).value);
            const pct = parseFloat(document.getElementById(`tp${i}Pct`).value);

            if (p > 0) {
                if (!hasTp) { tpString += `TP\n`; hasTp = true; }
                
                let roeStr = '';
                if (avgEp > 0) {
                    // 원본 구간 수익률 계산
                    let rawRoe = (posValue === 'long' ? (p - avgEp)/avgEp : (avgEp - p)/avgEp) * lev * 100;
                    
                    // 비중(%)을 곱하여 실제 기여 수익률 계산
                    let weightedRoe = rawRoe * (pct / 100);
                    
                    let sign = weightedRoe > 0 ? '+' : '';
                    roeStr = ` (${sign}${weightedRoe.toFixed(2)}%)`;
                }

                let pctStr = pct > 0 ? ` - ${pct}%` : '';
                tpString += `${formatNum(p)}${pctStr}${roeStr}\n`;
            }
        }
        if (hasTp) text += tpString + '\n';

        // 3. SL(손절) 처리 - 비중 적용 및 평균 단가 기준 계산
        const slPrice = parseFloat(document.getElementById('slPrice').value);
        const slPct = parseFloat(document.getElementById('slPct').value) || 100;
        
        if (slPrice > 0) {
            let roeStr = '';
            if (avgEp > 0) {
                let rawRoe = (posValue === 'long' ? (slPrice - avgEp)/avgEp : (avgEp - slPrice)/avgEp) * lev * 100;
                
                let weightedRoe = rawRoe * (slPct / 100);
                
                let sign = weightedRoe > 0 ? '+' : '';
                roeStr = ` (${sign}${weightedRoe.toFixed(2)}%)`;
            }
            text += `SL\n${formatNum(slPrice)} - ${slPct}%${roeStr}\n`;
        }

        document.getElementById('outputText').value = text.trim();
    }

    function copyText() {
        const textarea = document.getElementById('outputText');
        textarea.select();
        textarea.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(textarea.value).then(() => {
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ 복사 완료!';
            btn.style.backgroundColor = '#fff';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = 'var(--accent-color)';
            }, 1500);
        });
    }

    generateText();
</script>

</body>
</html>
